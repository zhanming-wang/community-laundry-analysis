name: Train Anomaly Model

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9am UTC (1am PST)
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy

      - name: Train model
        run: python train.py

      - name: Commit outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/alerts.json
          [ -f models/isolation_forest.pkl ] && git add models/isolation_forest.pkl
          git diff --staged --quiet || git commit -m "model: retrain $(date -u '+%Y-%m-%d')"
          git push
