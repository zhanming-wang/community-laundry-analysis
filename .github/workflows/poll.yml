name: Laundry Poller

on:
  schedule:
    - cron: '0,30 * * * *'   # every 30 min, 24/7
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      LOCATION_ID: ${{ secrets.LOCATION_ID }}
      ROOM_ID:     ${{ secrets.ROOM_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run poller
        run: python poll.py

      - name: Commit data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laundry_log.csv docs/summary.json
          git diff --staged --quiet || git commit -m "data: poll $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --rebase
          git push origin main
