name: Laundry Poller

on:
  schedule:
    # Every 30 min on the dot; offset run catches hours when GitHub skips top-of-hour (e.g. 4pm/5pm/7pm PST).
    - cron: '0,30 * * * *'
    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      LOCATION_ID: ${{ secrets.LOCATION_ID }}
      ROOM_ID:     ${{ secrets.ROOM_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run poller (retry with exponential backoff)
        run: |
          max_attempts=4
          attempt=1
          while true; do
            if python poll.py; then
              echo "Poll succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Poll failed after $max_attempts attempts"
              exit 1
            fi
            wait_sec=$(( 2 ** attempt ))
            echo "Attempt $attempt failed; waiting ${wait_sec}s before retry..."
            sleep "$wait_sec"
            attempt=$(( attempt + 1 ))
          done

      - name: Commit data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laundry_log.csv data/machines_log.csv docs/summary.json
          git diff --staged --quiet || git commit -m "data: poll $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --rebase
          git push origin main
