name: Laundry Poller

on:
  schedule:
    - cron: '0 13 * * *'   # 5am  PST
    - cron: '0 14 * * *'   # 6am  PST
    - cron: '0 15 * * *'   # 7am  PST
    - cron: '0 16 * * *'   # 8am  PST
    - cron: '0 17 * * *'   # 9am  PST
    - cron: '0 18 * * *'   # 10am PST
    - cron: '0 19 * * *'   # 11am PST
    - cron: '0 20 * * *'   # 12pm PST
    - cron: '0 21 * * *'   # 1pm  PST
    - cron: '0 22 * * *'   # 2pm  PST
    - cron: '0 23 * * *'   # 3pm  PST
    - cron: '0 0  * * *'   # 4pm  PST
    - cron: '0 1  * * *'   # 5pm  PST
    - cron: '0 2  * * *'   # 6pm  PST
    - cron: '0 3  * * *'   # 7pm  PST
    - cron: '0 4  * * *'   # 8pm  PST
    - cron: '0 5  * * *'   # 9pm  PST
    - cron: '0 6  * * *'   # 10pm PST
    - cron: '0 7  * * *'   # 11pm PST
    - cron: '0 8  * * *'   # 12am PST
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      LOCATION_ID: ${{ secrets.LOCATION_ID }}
      ROOM_ID:     ${{ secrets.ROOM_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run poller
        run: python poll.py

      - name: Commit data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/laundry_log.csv docs/summary.json
          git diff --staged --quiet || git commit -m "data: poll $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
